<!---前端开发依赖的三种核心技术：--->
  <!---1,HTML(HyperText Markup Language)
规范属性：一种基于SGML的标记语言，当前由WHATWG维护的HTML Living Standard定义,W3C同步发布快照版本。其核心是定义文档的结构化语义与元素类型，通过标签构建内容层次。
解析模型：浏览器解析 HTML 生成 DOM（文档对象模型）树,作为后续样式计算、布局和脚本执行的底层数据接口。HTML 元素支持全局属性和内容模型，确保语义化与可访问性。
工程化角色：作为 Web 应用的骨架，与 CSSOM 结合形成渲染树，同时承载前端框架的挂载点。现代 HTML 还支持 Web Components（自定义元素、Shadow DOM）以实现组件化封装。--->
  <!---2,CSS (Cascading Style Sheets)
规范属性：一种声明式的样式表语言，由W3C分模块维护,如CSS2.1、CSS3各模块。其核心机制是级联与继承，通过选择器将样式规则绑定到DOM元素，控制视觉呈现。
渲染模型：浏览器解析CSS生成CSS树，与DOM合并为渲染树，经过布局、绘制和合成最终显示。支持盒模型、浮动、定位、Flexbox与Grid布局，以及变换、过渡和关键帧动画。
工程化角色：负责表示层的分离，实现响应式设计、主题切换和性能优化。在现代工程中常通过预处理器或 CSS-in-JS 方案增强可维护性。--->
  <!---3,JavaScript (JS)
规范属性：一种动态类型、基于原型的高级脚本语言，核心规范由ECMA International的TC39委员会维护，即ECMAScript标准。支持多范式：面向对象、函数式、事件驱动。
运行时模型：在浏览器中由JavaScript引擎解释/编译执行。通过Web API与宿主环境交互。采用单线程事件循环和任务队列实现非阻塞异步编程。
工程化角色：作为Web应用的行为层，操作 DOM 树、BOM 对象，实现动态交互与数据流控制。现代工程中广泛使用TypeScript和框架进行大规模应用开发，并通过模块化、构建工具管理依赖。
--->
  <!---这三者共同构成Web开发的基石：HTML 定义内容结构与语义，CSS 负责呈现与响应式布局，JavaScript 实现动态逻辑与状态管理。
  在浏览器渲染管线中，它们依次被解析、组合并最终生成用户交互的界面。--->

  <!---
HTML（超文本标记语言）：负责网页的结构。就像盖房子的框架，用来定义哪里是标题、哪里是段落、哪里放图片。例如 <h1> 表示一级标题，<p> 表示段落。
CSS（层叠样式表）：负责网页的样式。就像给房子装修，用来设置颜色、字体、大小、布局、动画等。例如让标题变成红色，把导航栏固定在顶部。
JavaScript：负责网页的行为。就像给房子装上电灯、开关，让页面“动起来”并能响应用户的操作。例如点击按钮弹出提示框、轮播图自动切换、表单验证输入是否为空
--->

    <script>

            document.getElementById('message').textContent = '你好！欢迎学习前端开发！';

            document.getElementById('colorBox').style.backgroundColor = randomColor;
        }
    </script>
